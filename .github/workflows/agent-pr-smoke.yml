name: Agent PR Smoke

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - agent.py
      - .github/tests/test_agent_pr_smoke.py
      - .github/workflows/agent-pr-smoke.yml

permissions:
  contents: read

concurrency:
  group: agent-pr-smoke-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Agent PR Smoke
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest pyflakes

      - name: Run agent smoke checks
        run: python -m pytest -q .github/tests/test_agent_pr_smoke.py
